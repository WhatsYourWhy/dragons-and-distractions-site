- slug: task-hydra
  struggle: "I have too many tasks and I cannot tell where to start."
  summary: "Start here when your list keeps multiplying, your tabs are breeding, or choosing the first step feels impossible."
  monster_name: "Task Hydra"
  monster_url: "/monsters/task-hydra/"
  signs:
    - "You keep rewriting the list instead of doing the work."
    - "Every task feels equally urgent, so none of them move."
    - "New tasks appear mid-stream and pull you away from the first one."
  ritual_label: "Use the Single-Task Oath"
  ritual_url: "/spellbook/single-task-oath.html"
  ritual_summary: "Choose one head, hide the rest, and work the first cut before switching."
  printable_label: "Grab the Single-Task Oath card"
  printable_url: "/site/printables/pdf/single-task-oath-card-ink.pdf"
  printable_summary: "A fast focus card you can print or keep open beside your work."
- slug: temporal-shark
  struggle: "Deadlines do not feel real until they are already biting me."
  summary: "Start here when time keeps disappearing, prep steps stay invisible, or panic becomes the only thing that gets you moving."
  monster_name: "Temporal Shark"
  monster_url: "/monsters/temporal-shark/"
  signs:
    - "You feel calm right up until something is suddenly due."
    - "A task looks small until you count the setup and recovery time."
    - "You need alarms, pings, or another human to make time feel solid."
  ritual_label: "Set a Tide Mark"
  ritual_url: "/spellbook/tide-mark-calendar.html"
  ritual_summary: "Put the real start time on your calendar and add T-60 and T-15 alarms with action verbs."
  printable_label: "Use the Tide Mark card"
  printable_url: "/site/printables/pdf/tide-mark-calendar-card-ink.pdf"
  printable_summary: "A printable reminder to make time visible before the shark fin appears."
- slug: slumber-troll
  struggle: "Crossing from rest to motion feels absurdly hard."
  summary: "Start here when mornings, wake-ups, or other body-state transitions feel heavier than the task itself."
  monster_name: "Slumber Troll"
  monster_url: "/monsters/slumber-troll/"
  signs:
    - "You bargain for five more minutes until the morning is gone."
    - "You know what to do next, but getting vertical feels impossible."
    - "Light, music, or accountability help more than logic does."
  ritual_label: "Use the Wake Invocation"
  ritual_url: "/spellbook/wake-invocation.html"
  ritual_summary: "Count down, move before negotiating, and stack light plus a simple accountability cue."
  printable_label: "Grab the Wake Invocation checklist"
  printable_url: "/site/printables/pdf/wake-invocation-checklist-ink.pdf"
  printable_summary: "A bedside card for getting from blankets to momentum."
- slug: dopamine-goblin
  struggle: "Shiny distractions keep outbidding the work I chose."
  summary: "Start here when boredom, scrolling, novelty, or impulse trades keep stealing the session you meant to protect."
  monster_name: "Dopamine Goblin"
  monster_url: "/monsters/dopamine-goblin/"
  signs:
    - "You open one tab or app and lose the whole block."
    - "A boring task feels physically harder than a distracting one."
    - "Rewards help, but only if you decide them before you wander."
  ritual_label: "Make a Goblin deal"
  ritual_url: "/spellbook/#dopamine-goblin-rituals"
  ritual_summary: "Pick a short work block, pre-choose the reward, and make the distraction wait its turn."
  printable_label: "Reuse the Single-Task Oath card"
  printable_url: "/site/printables/pdf/single-task-oath-card-ink.pdf"
  printable_summary: "Use the focus card as a visible contract while you bargain with the goblin."
- slug: cave-bear
  struggle: "I keep retreating, hiding, or staying in the cave even when I want out."
  summary: "Start here when isolation, shutdown, scrolling in bed, or gentle avoidance are shrinking your world."
  monster_name: "Cave Bear"
  monster_url: "/monsters/cave-bear/"
  signs:
    - "Rest keeps turning into retreat."
    - "Replying, leaving the room, or starting the errand feels too big."
    - "A text, doorway step, or tiny body cue helps more than making a bigger plan."
  ritual_label: "Cast the Threshold Spell"
  ritual_url: "/spellbook/#cave-bear-rituals"
  ritual_summary: "Step to a doorway, take the first body movement, and use a social rope if you need help leaving the cave."
  printable_label: "Use the Buddy Ping template"
  printable_url: "/site/printables/pdf/tide-marks-buddy-ping-ink.pdf"
  printable_summary: "A fast accountability script for asking someone to help you re-enter the world."
- slug: perfection-wyrm
  struggle: "I keep polishing the work instead of finishing or sending it."
  summary: "Start here when the draft is already useful but another round of edits feels safer than letting anyone see it."
  monster_name: "Perfection Wyrm"
  monster_url: "/monsters/perfection-wyrm/"
  signs:
    - "You tell yourself the next pass is about quality, but it is really about fear."
    - "Finishing feels riskier than revising."
    - "A visible stop rule helps more than vague permission to relax."
  ritual_label: "Cast Ugly First Pass"
  ritual_url: "/spellbook/#perfection-wyrm-rituals"
  ritual_summary: "Define useful enough, make one imperfect pass, and stop when the work crosses the ship line."
  printable_label: "Use the Done Is Better worksheet"
  printable_url: "/site/printables/pdf/perfection-wyrm-done-is-better-ink.pdf"
  printable_summary: "A simple stop-rule worksheet for choosing completion over another revision loop."
- slug: rejection-wisp
  struggle: "One hard message makes the whole inbox feel dangerous."
  summary: "Start here when unread replies, criticism, or vague silence have turned communication into a body-level threat."
  monster_name: "Rejection Wisp"
  monster_url: "/monsters/rejection-wisp/"
  signs:
    - "You can name the reply, but sending it still feels unsafe."
    - "One awkward thread poisons every other unopened message."
    - "A short script works better than trying to improvise while flooded."
  ritual_label: "Use the Reply Scaffold"
  ritual_url: "/spellbook/#rejection-wisp-rituals"
  ritual_summary: "Choose the smallest reply shape that moves the thread forward and send that version first."
  printable_label: "Grab the Reply Scaffold card"
  printable_url: "/site/printables/pdf/rejection-wisp-reply-scaffold-ink.pdf"
  printable_summary: "A low-stakes response card for acknowledgements, clarifying questions, and gentle no's."
- slug: sensory-storm
  struggle: "Everything around me feels too loud, bright, sharp, or intense."
  summary: "Start here when overload is making it hard to think, speak, or stay present and you need to lower input before doing anything else."
  monster_name: "Sensory Storm"
  monster_url: "/monsters/sensory-storm/"
  signs:
    - "You are getting fragile, foggy, or snappy faster than the situation seems to justify."
    - "Changing the environment helps more than another productivity trick."
    - "You need shelter before you need a plan."
  ritual_label: "Reduce Inputs First"
  ritual_url: "/spellbook/#sensory-storm-rituals"
  ritual_summary: "Lower one major input, add one anchor, and shrink the environment before you ask your brain for more."
  printable_label: "Use the Sensory Reset card"
  printable_url: "/site/printables/pdf/sensory-storm-reset-card-ink.pdf"
  printable_summary: "A quick triage card for overload, regulation, and the next smallest safe move."
- slug: burnout-dragon
  struggle: "Everything costs too much and I do not have the fuel I used to."
  summary: "Start here when exhaustion has become the climate, ordinary tasks feel expensive, and the honest answer is fewer demands."
  monster_name: "Burnout Dragon"
  monster_url: "/monsters/burnout-dragon/"
  signs:
    - "Simple things now feel steep."
    - "Rest keeps getting postponed because there is always more to carry."
    - "You need a smaller day, not a more inspiring plan."
  ritual_label: "Build a Minimum Viable Day"
  ritual_url: "/spellbook/#burnout-dragon-rituals"
  ritual_summary: "Cut the day to essentials, protect one recovery action, and stop budgeting energy you do not have."
  printable_label: "Use the Minimum Viable Day sheet"
  printable_url: "/site/printables/pdf/burnout-dragon-minimum-viable-day-ink.pdf"
  printable_summary: "A capacity sheet for naming what must happen, what can wait, and what protects the ember."

