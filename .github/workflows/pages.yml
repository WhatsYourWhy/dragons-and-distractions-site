name: Deploy Jekyll site to Pages

on:
  push:
    branches: [main, work]
  pull_request:
    branches: [main, work]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler: "4.0.3"
          bundler-cache: true

      - name: Install PDF dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Regenerate printable PDFs
        run: python scripts/generate_printable_pdfs.py

      - name: Check printable links
        run: python scripts/check_printable_links.py

      - name: Check monster metadata
        run: python scripts/check_monster_metadata.py

      - name: Check CODEX prompt contracts
        run: python scripts/validate_codex_prompts.py

      - name: Run pytest suite
        run: pytest -q

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        run: bundle exec jekyll build --source . --destination _site

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/work'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
