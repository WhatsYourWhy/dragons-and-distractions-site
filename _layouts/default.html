<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: 'en' }}">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    {%- seo -%}
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,400&family=Lora:ital,wght@0,400;0,600;1,400&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ "/assets/main.css" | relative_url }}">
    <link rel="stylesheet" href="{{ "/assets/design.css?v=20260325" | relative_url }}">
    {%- feed_meta -%}
  </head>
  <body>
    <script>
      (function () {
        const storageKey = "dd-theme";
        const className = "theme-low-stim";
        const root = document.documentElement;
        const navOpenClass = "nav-open";
        const mobileOverlayQuery = "(max-width: 760px)";
        const navFocusableSelector = [
          "a[href]",
          "button:not([disabled])",
          "input:not([disabled]):not([type='hidden'])",
          "select:not([disabled])",
          "textarea:not([disabled])",
          "[tabindex]:not([tabindex='-1'])"
        ].join(",");
        let lastMenuToggleButton = null;

        const getStoredPreference = () => {
          try {
            return localStorage.getItem(storageKey);
          } catch (error) {
            return null;
          }
        };

        const setStoredPreference = (theme) => {
          try {
            localStorage.setItem(storageKey, theme);
          } catch (error) {
            /* ignore write errors */
          }
        };

        const getPreferredTheme = () => {
          const stored = getStoredPreference();
          if (stored === "low-stim" || stored === "default") {
            return stored;
          }
          return "default";
        };

        const applyTheme = (theme) => {
          const isLowStim = theme === "low-stim";
          document.body.classList.toggle(className, isLowStim);
          document.body.dataset.theme = theme;
          root.dataset.theme = theme;
          document.querySelectorAll(".js-theme-toggle").forEach((button) => {
            button.setAttribute("aria-checked", String(isLowStim));
            const status = button.querySelector(".theme-toggle__status");
            button.setAttribute("aria-label", isLowStim ? "Low Stim on" : "Low Stim off");
            if (status) {
              status.textContent = isLowStim ? "On" : "Standard mode";
            }
          });
        };

        const isMobileOverlayModeActive = () => window.matchMedia(mobileOverlayQuery).matches;

        const getNavFocusableElements = (nav = document.querySelector(".js-site-nav")) => {
          if (!nav) {
            return [];
          }

          return Array.from(nav.querySelectorAll(navFocusableSelector)).filter((element) => {
            if (element.getAttribute("aria-hidden") === "true") {
              return false;
            }
            return element.getClientRects().length > 0;
          });
        };

        const applyNavState = (isOpen, options = {}) => {
          const shouldRestoreFocus = options.restoreFocus !== false;
          document.body.classList.toggle(navOpenClass, isOpen);
          root.dataset.navOpen = isOpen ? "open" : "closed";
          document.querySelectorAll(".js-menu-toggle").forEach((button) => {
            button.setAttribute("aria-expanded", String(isOpen));
            button.setAttribute("aria-label", isOpen ? "Close menu" : "Open menu");
            const label = button.querySelector(".site-banner__menu-toggle-text");
            if (label) {
              label.textContent = isOpen ? "Close" : "Menu";
            }
          });

          if (isOpen && isMobileOverlayModeActive()) {
            const [firstFocusableItem] = getNavFocusableElements();
            if (firstFocusableItem) {
              firstFocusableItem.focus();
            }
          }

          if (!isOpen && shouldRestoreFocus && isMobileOverlayModeActive()) {
            const menuToggleButton = lastMenuToggleButton || document.querySelector(".js-menu-toggle");
            if (menuToggleButton) {
              menuToggleButton.focus();
            }
          }
        };

        const initialTheme = getPreferredTheme();
        applyTheme(initialTheme);
        applyNavState(false, { restoreFocus: false });

        document.addEventListener("DOMContentLoaded", () => {
          applyTheme(document.body.classList.contains(className) ? "low-stim" : "default");
          applyNavState(false, { restoreFocus: false });

          document.querySelectorAll(".js-theme-toggle").forEach((button) => {
            button.addEventListener("click", () => {
              const isLowStim = document.body.classList.toggle(className);
              const theme = isLowStim ? "low-stim" : "default";
              applyTheme(theme);
              setStoredPreference(theme);
            });
          });

          document.querySelectorAll(".js-menu-toggle").forEach((button) => {
            button.addEventListener("click", () => {
              lastMenuToggleButton = button;
              const isOpen = !document.body.classList.contains(navOpenClass);
              applyNavState(isOpen);
            });
          });

          document.querySelectorAll(".js-site-nav").forEach((nav) => {
            nav.addEventListener("click", (event) => {
              if (event.target === nav) {
                applyNavState(false);
              }
            });

            nav.querySelectorAll("a").forEach((link) => {
              link.addEventListener("click", () => applyNavState(false));
            });
          });

          document.addEventListener("keydown", (event) => {
            if (
              event.key === "Tab" &&
              document.body.classList.contains(navOpenClass) &&
              isMobileOverlayModeActive()
            ) {
              const nav = document.querySelector(".js-site-nav");
              const focusableElements = getNavFocusableElements(nav);
              if (!nav || focusableElements.length === 0) {
                return;
              }

              const firstFocusable = focusableElements[0];
              const lastFocusable = focusableElements[focusableElements.length - 1];
              const activeElement = document.activeElement;

              if (event.shiftKey) {
                if (activeElement === firstFocusable || !nav.contains(activeElement)) {
                  event.preventDefault();
                  lastFocusable.focus();
                }
              } else if (activeElement === lastFocusable || !nav.contains(activeElement)) {
                event.preventDefault();
                firstFocusable.focus();
              }
            }

            if (event.key === "Escape") {
              applyNavState(false);
            }
          });

          const backTop = document.querySelector(".js-back-to-top");
          if (backTop) {
            const motionQuery = window.matchMedia("(prefers-reduced-motion: reduce)");
            const toggleBackTop = () => {
              const y = window.scrollY || document.documentElement.scrollTop;
              backTop.hidden = y < 420;
            };
            toggleBackTop();
            window.addEventListener("scroll", toggleBackTop, { passive: true });
            backTop.addEventListener("click", () => {
              const instant = motionQuery.matches;
              window.scrollTo({ top: 0, behavior: instant ? "auto" : "smooth" });
              const mainEl = document.getElementById("main-content");
              if (mainEl) {
                mainEl.focus({ preventScroll: true });
              }
            });
          }
        });
      })();
    </script>
    <a class="skip-to-content" href="#main-content">Skip to content</a>
    {%- assign header_include = page.header_include | default: site.header_include -%}
    <header class="site-header" role="banner">
      {%- if header_include -%}
        {%- include {{ header_include }} -%}
      {%- endif -%}
    </header>

    <main id="main-content" class="page-content" aria-label="Content" tabindex="-1">
      <div class="wrapper">
        {{ content }}
      </div>
    </main>

    <button type="button" class="back-to-top js-back-to-top" hidden aria-label="Back to top">
      <span aria-hidden="true">↑</span>
    </button>

    {%- include footer.html -%}
  </body>
</html>
