title: "Dragons & Distractions"
description: "ADHD-friendly rituals, monsters, and tools"
url: "https://dragonsanddistractions.com"
baseurl: ""

# Social sharing / Open Graph
logo: "/assets/generated/homepage-hero-web.png"
social:
  name: "Dragons & Distractions"
  links: []

twitter:
  username: WhatsYourWhy
  card: summary_large_image
markdown: kramdown
theme: minima
header_include: site-header.html

plugins:
  - jekyll-optional-front-matter
  - jekyll-titles-from-headings
  - jekyll-sitemap

titles_from_headings:
  strip_title: true

optional_front_matter:
  remove_originals: true

exclude:
  # Jekyll defaults (must be re-listed when providing a custom exclude:)
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  # Project-specific
  - docs/
  - tests/
  - scripts/
  - tmp/
  - output/
  - README.md
  - LICENSE
  - requirements.txt
  - pytest.ini
  - "*.zip"
  - "Website functionality testing.pdf"

collections:
  monsters:
    output: true
    permalink: /monsters/:name/

defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: page
      header_include: site-header.html
      image:
        path: "/assets/generated/homepage-hero-web.png"
        width: 1536
        height: 1024
        alt: "Mythic tabletop landscape with a lantern, ritual cards, and a path opening toward dawn"
  - scope:
      path: "site/printables"
      type: "pages"
    values:
      layout: printable
      header_include: header-nav.html
      show_breadcrumbs: false
  - scope:
      path: ""
      type: "monsters"
    values:
      layout: monster
      header_include: site-header.html
      image:
        path: "/assets/generated/homepage-hero-web.png"
        width: 1536
        height: 1024
        alt: "Mythic tabletop landscape with a lantern, ritual cards, and a path opening toward dawn"
